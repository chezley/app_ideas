name: OnePieceTCG
options:
  bundleIdPrefix: com.chezley
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

targets:
  OnePieceTCG:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OnePieceTCG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chezley.onepiecetcg
        PRODUCT_NAME: OnePieceTCG
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: "One Piece TCG"
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        INFOPLIST_KEY_UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ENABLE_PREVIEWS: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic

  OnePieceTCGTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: OnePieceTCGTests
    dependencies:
      - target: OnePieceTCG
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chezley.onepiecetcg.tests
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  OnePieceTCG:
    build:
      targets:
        OnePieceTCG: all
        OnePieceTCGTests: [test]
    test:
      targets:
        - OnePieceTCGTests
