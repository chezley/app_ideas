# Autonomous ticket-working fleet.
#
# Spins up a matrix of parallel Claude Code agents that pull open `pm` tickets
# from this repo's Issues, work them, and mark them done. Each matrix job is one
# worker; the pm claim protocol keeps them from grabbing the same ticket.
#
# Setup (one time):
#   1. Repo settings -> Secrets and variables -> Actions:
#        ANTHROPIC_API_KEY   (secret)  - key for Claude Code
#   2. Ensure labels exist:  pm -R <owner/repo> init   (or run the "init" job below once)
#   3. Give Actions write access to issues: Settings -> Actions -> General ->
#        Workflow permissions -> "Read and write permissions".
#
# Trigger it from the Actions tab (Run workflow) or let the schedule fire it.
name: pm-agents

on:
  workflow_dispatch:
    inputs:
      workers:
        description: "Number of parallel agents"
        default: "3"
        required: true
      max_tickets:
        description: "Max tickets per worker (0 = until board empty)"
        default: "0"
        required: true
  schedule:
    # Every 30 minutes; drop or edit if you only want manual runs.
    - cron: "*/30 * * * *"

# Don't let overlapping runs pile up onto the same board.
concurrency:
  group: pm-agents-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write   # so agents can commit/push their work
  issues: write     # so pm can move tickets through their states

jobs:
  # Fan out into N identical workers. GitHub caps matrix size at 256.
  work:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # 3 workers by default; for workflow_dispatch this is a fixed fan-out.
        # Adjust the list length to change the default parallelism.
        worker: [1, 2, 3]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Make pm available
        run: |
          chmod +x ./pm
          echo "$PWD" >> "$GITHUB_PATH"

      - name: Ensure labels exist (idempotent)
        env:
          GH_TOKEN: ${{ github.token }}
        run: pm -R "${{ github.repository }}" init || true

      - name: Work tickets
        env:
          GH_TOKEN: ${{ github.token }}                 # gh auth for pm
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PM_REPO: ${{ github.repository }}
          PM_AGENT: ci-agent-${{ matrix.worker }}
          PM_IDLE_EXIT: "1"                              # exit when board is empty
          PM_MAX: ${{ github.event.inputs.max_tickets || '0' }}
          PM_CLAIM_SETTLE: "5"                           # a bit more slack in CI
          # Non-interactive Claude Code:
          CLAUDE_ARGS: "--dangerously-skip-permissions"
          # Give each worker a small random head start so claims don't all land
          # at the exact same instant.
        run: |
          sleep $(( RANDOM % 8 ))
          chmod +x ./run-agent.sh
          ./run-agent.sh

      - name: Commit any work produced
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "pm-agent-${{ matrix.worker }}"
          git config user.email "pm-agent@users.noreply.github.com"
          if ! git diff --quiet || ! git diff --cached --quiet; then
            git add -A
            git commit -m "pm-agent-${{ matrix.worker }}: work from run ${{ github.run_id }}"
            git push || echo "push skipped (nothing to push or protected branch)"
          else
            echo "no file changes to commit"
          fi
